<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="register.css">
    <title>Register</title>
</head>
<body>
    <header class="site-header">
        <h1>Student Carer Support System</h1>
        <nav>
            <a href="index.html">About Us</a>
            <a href="directory.html">Resources</a>
            <a href="faqs.html">FAQs</a>
            <a href="support-form.html">Contact Us</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
    </header>
<main class="page single-column">
    <section class="card">
        <h2>Register</h2>

        <form id="register-form" novalidate>
            <label for="identify-status">Are you a student carer? </label>
            <input type="radio" name="status" value="yes">Yes 
        </label>

            <label> 
                <input type="radio" name="carer" value="no"> No
            </label>
            <label for="register-name">Name</label>
            <input id="register-name" name="name" type="text" maxlength="100" placeholder="First Last" required>

            <label for="register-email">Email</label>
            <input id="register-email" name="email" type="email" placeholder="you@example.com" required>

            <label for="register-password">Password</label>
            <input id="register-password" name="password" type="password" minlength="6" placeholder="••••••••" required>

            <button type="submit">Create Account</button>
            <p id="register-message" class="form-message" aria-live="polite"></p>
        </form>
        
        <p>Already have an account? <a href="login.html">Login here</a>.</p>
    </section>
</main>

<script src="register.js"></script>
</body>
</html>
